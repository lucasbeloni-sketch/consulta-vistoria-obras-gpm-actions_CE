name: Baixar Consulta Vistoria de Obras GPM

on:
  # Cron desativado (2026-07-21, a pedido) — so run manual por enquanto.
  # Pra reativar, descomente e ajuste o horario:
  # schedule:
  #   - cron: "0 9 * * *"    # diario 09:00 UTC = 06:00 BRT
  workflow_dispatch: {}      # botao manual na aba Actions

permissions:
  contents: read
  issues: write              # pra abrir/comentar issue de falha

# Evita 2 runs simultaneos (cron + manual) escrevendo o mesmo arquivo no Drive.
concurrency:
  group: baixar-consulta-vistoria
  cancel-in-progress: false

jobs:
  baixar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Testes unitarios
        run: npm test

      - name: Install Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Parte 1 — baixar relatorio e enviar ao Drive
        run: npm start
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GPM_USER: ${{ secrets.GPM_USER }}
          GPM_PASS: ${{ secrets.GPM_PASS }}
          DEBUG_DUMP: "1"   # TEMP: diagnostico da coluna Data/Hora no headless

      - name: Parte 2 — compilar colunas na aba BD_Vistoria_GPM
        run: npm run compilar
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Upload artefatos de debug
        if: always()   # TEMP: sempre, pra diagnostico da coluna Data/Hora
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

  notify:
    needs: baixar
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = "consulta-vistoria-falha";
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { owner, repo } = context.repo;
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: label });
            const body = `Download da Consulta Vistoria de Obras falhou no run ${context.runId}.\n\nLog: ${url}\n\nO CSV pode estar desatualizado ate o proximo run dar certo. Baixe os artefatos de debug do run pra ver os screenshots.`;
            if (open.data.length) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: "Consulta Vistoria de Obras GPM falhando", body, labels: [label] });
            }
